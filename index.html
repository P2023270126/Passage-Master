<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Passage Master</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        /* 強制固定重組句子的顯示容器 */
        .word-slots {
            display: flex !important;
            flex-wrap: wrap !important;
            gap: 12px !important;
            justify-content: center !important;
            align-content: flex-start !important;
            min-height: 150px !important;
            width: 100% !important;
            max-width: 600px !important;
            margin: 20px auto !important;
            padding: 20px !important;
            background-color: #fcfcfc !important;
            border: 2px dashed #aaaaaa !important;
            border-radius: 15px !important;
            box-sizing: border-box !important;
        }

        .selected-word {
            display: inline-block !important;
            background-color: #ffffff !important;
            border: 1px solid #ddd !important;
            padding: 8px 15px !important;
            border-radius: 8px !important;
            font-size: 1.2rem !important;
            font-weight: bold !important;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1) !important;
        }

        .options-grid {
            display: flex !important;
            flex-wrap: wrap !important;
            justify-content: center !important;
            gap: 10px !important;
            margin-top: 20px !important;
        }
        
        /* Tense Master 專用樣式 */
        .tm-marker {
            cursor: pointer;
            padding: 2px 5px;
            border-bottom: 2px solid #3498db;
            transition: background 0.3s;
        }
        .tm-marker:hover { background-color: #ebf5fb; }
        .tm-marker.selected { background-color: #f1c40f; border-bottom: 2px solid #e67e22; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen">
        <h1>請選擇身份</h1>
        <div class="login-container">
            <button class="identity-btn" onclick="selectUser('66')">66 Jasper</button>
            <button class="identity-btn" onclick="selectUser('22')">22 Jolie</button>
        </div>
    </div>

    <div id="menu-screen" class="screen" style="display:none;">
        <h2 id="welcome-msg">Welcome</h2>
        <div class="menu-grid">
            <button class="mode-btn" onclick="startSpellingGame()">Spelling (拼字)</button>
            <button class="mode-btn" onclick="startRearrangeGame()">Rearrange (重組)</button>
            <!-- 在第 73 行附近 -->
            <button class="mode-btn" style="background-color: #007bff;" onclick="startRearrangeGame()">Rearrange (重組)</button>
            <!--<button class="mode-btn" style="background-color: #9b59b6;" onclick="startProofreadGame()">Proofread (辨錯)</button> -->
            <!-- 新增 Tense Master 按鈕 -->
            <button class="mode-btn" style="background-color: #e67e22;" onclick="startTenseMaster()">Tense Master (時態)</button>
        </div>
        <button onclick="logout()">切換身份</button>
    </div>

<!-- Spelling Screen -->
<div id="spelling-screen" class="screen" style="display:none;">
    <h2 id="spelling-title">Spelling Game</h2>
    
    <!-- 確認這段 filter-container 是否還在 -->
    <div class="filter-container">
        <select id="spelling-category-filter" onchange="filterByCategory('Spelling')">
            <option value="all">全部類別</option>
        </select>
    </div>
    
    <!-- Remove the Undo button from here -->

    <p id="spelling-sentence"></p>
    <div id="spelling-word-display" style="min-height: 80px;"></div>
    
    <!-- 1. Word Choices -->
    <div id="spelling-options" class="options-grid"></div>

    <!-- 2. The New Large Undo Button (Correct Position) -->
    <div style="text-align: center; margin: 30px 0;">
        <button id="spelling-undo-btn" class="next-btn" style="background-color: #6c757d; transform: scale(1.5); padding: 10px 20px;">Undo ↩</button>
    </div>

    <!-- 3. Feedback Area -->
    <div id="spelling-feedback" style="display:none;">
        <h3 id="feedback-text"></h3>
        <button onclick="nextSpellingQuestion()">下一題</button>
    </div>

    <hr>
    
    <!-- 4. Back Button -->
    <button onclick="showScreen('menu-screen')">返回選單</button>
</div>
    
    <!-- Rearrange -->
    <div id="rearrange-screen" class="screen" style="display:none;">
        <h2 id="rearrange-title">Sentence Rearrange</h2>
        <div class="filter-container">
            <select id="rearrange-category-filter" onchange="filterByCategory('Rearrange')">
                <option value="all">全部類別</option>
            </select>
        </div>
        <div id="rearrange-word-display" class="word-slots"></div>
        <div id="rearrange-undo-container"><button onclick="undoLastWord()">↩ 退回</button></div>
        <div id="rearrange-options" class="options-grid"></div>
        <div id="rearrange-feedback" style="display:none;">
            <h3 id="rearrange-feedback-text"></h3>
            <button onclick="speakSentence()">🔊 聽全文</button>
            <button onclick="nextRearrangeQuestion()">下一題</button>
        </div>
        <hr><button onclick="showScreen('menu-screen')">返回選單</button>
    </div>

    <!-- Proofread -->
    <div id="proofread-screen" class="screen" style="display:none;">
        <h2>Proofread Mode</h2>
        <div id="proofread-sentence-display"></div>
        <div id="correction-input-area" style="display:none;">
            <p>Selected: <span id="selected-wrong-word" style="color:red;"></span></p>
            <input type="text" id="user-correction">
            <button onclick="checkCorrection()">Submit</button>
        </div>
        <div id="proofread-feedback" style="display:none;">
            <p id="proofread-feedback-text"></p>
            <button onclick="nextProofreadQuestion()">Next</button>
        </div>
        <hr><button onclick="showScreen('menu-screen')">Back</button>
    </div>

    <!-- Tense Master (新畫面) -->
    <div id="tense-master-screen" class="screen" style="display:none;">
        <h2>Tense Master</h2>
        <div class="game-container">
            <h3 id="tm-instruction">Step 1: Click the Time Marker (時態提示詞)</h3>
            <!-- 原本 139 行： -->
            <div id="tm-sentence-container" style="font-size: 1.5rem; line-height: 2; margin: 30px 0;">
                <!-- 建議裡面加多一個 div 專門放底線句子 -->
                <div id="tm-fill-blank-line" style="font-weight: bold; color: #ccc; margin-top: 15px;"></div>
            </div>
            
            <div id="tm-step2-area" style="display:none; border-top: 2px solid #eee; padding-top: 20px;">
                <p>Step 2: Select the correct Verb Form</p>
                <div id="tm-options" class="options-grid"></div>
            </div>

            <div id="tm-feedback" style="margin-top: 20px; font-weight: bold; font-size: 1.2rem;"></div>
            <button id="tm-next-btn" onclick="nextTenseQuestion()" style="display:none; margin-top:20px;">Next Question</button>
        </div>
        <hr><button onclick="showScreen('menu-screen')">Back to Menu</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
