<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Passage Master</title>
    <link rel="stylesheet" href="style.css">
    <!-- 引入 PapaParse 工具，用來讀取 Google Sheets 的 CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>
    <!-- 身份選擇頁面 -->
    <div id="login-screen" class="screen">
        <h1>請選擇身份</h1>
        <div class="login-container">
            <button class="identity-btn" onclick="selectUser('66')">66 Jasper</button>
            <button class="identity-btn" onclick="selectUser('22')">22 Jolie</button>
        </div>
    </div>

    <!-- 模式選擇頁面 (初始隱藏) -->
    <div id="menu-screen" class="screen" style="display:none;">
        <h2 id="welcome-msg"></h2>
        <div id="category-list"></div>
        <div class="menu-buttons">
            <button class="mode-btn" onclick="startSpellingGame()">Spelling (拼字練習)</button>
            <!-- 找到 menu-screen 區塊，加入這個按鈕 -->
            <button class="mode-btn" onclick="startRearrangeGame()">Rearrange (重組句子)</button>
        </div>
        <button onclick="logout()">切換身份</button>
    </div>

    <!-- Spelling 遊戲畫面 (初始隱藏) -->
    <div id="spelling-screen" class="screen" style="display:none;">
        <h2 id="spelling-title">Spelling Game</h2>
        
        <!-- 顯示挖空的句子 -->
        <p id="spelling-sentence" style="font-size: 1.2rem; margin: 20px; line-height: 1.6;"></p>
        
        <!-- 顯示拼字底線格子 -->
        <div id="spelling-word-display" style="min-height: 50px; margin-bottom: 20px;"></div>
        
        <!-- 顯示亂序字母按鈕 -->
        <div id="spelling-options" class="options-grid"></div>

        <!-- [新增項目] 結果回饋區塊：顯示對錯與下一題按鈕 -->
        <div id="spelling-feedback" style="display:none; margin: 20px auto; padding: 20px; border: 2px solid #28a745; border-radius: 10px; background-color: #f9fff9; max-width: 400px;">
            <h3 id="feedback-text" style="color: #28a745; margin-bottom: 15px; font-size: 1.5rem;">✅ Correct!</h3>
            <button id="next-btn" class="mode-btn" style="background-color: #28a745; color: white;" onclick="nextSpellingQuestion()">下一題</button>
        </div>
        
        <hr>
        <button onclick="showScreen('menu-screen')">返回選單</button>
    </div>

<!-- Rearrange 遊戲畫面 -->
<div id="rearrange-screen" class="screen" style="display:none;">
    <h2 id="rearrange-title">Sentence Rearrange</h2>
    
    <!-- 顯示提示（可能是中文翻譯或圖片說明） -->
    <p id="rearrange-hint" class="sentence-box" style="font-style: italic; color: #666;"></p>
    
    <!-- 玩家拼湊出的句子顯示區 -->
    <div id="rearrange-word-display" class="word-slots" style="min-height: 80px; border: 1px dashed #ccc; padding: 10px; margin-bottom: 20px;"></div>
    
    <!-- 亂序單字按鈕區 -->
    <div id="rearrange-options" class="options-grid"></div>

    <!-- 結果回饋區塊 -->
    <div id="rearrange-feedback" style="display:none; margin: 20px auto; padding: 20px; border: 2px solid #28a745; border-radius: 10px; background-color: #f9fff9; max-width: 400px;">
        <h3 id="rearrange-feedback-text" style="color: #28a745; margin-bottom: 15px;">✅ Excellent!</h3>
        <button class="mode-btn" style="background-color: #28a745; color: white;" onclick="nextRearrangeQuestion()">下一題</button>
    </div>
    
    <hr>
    <button onclick="showScreen('menu-screen')">返回選單</button>
</div>
    
    <script src="app.js"></script>
</body>
</html>
